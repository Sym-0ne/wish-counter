  <!-- Petits points décoratifs -->
  <circle cx="256" cy="430" r="8" fill="#9966cc" opacity="0.7"/>
  <circle cx="200" cy="415" r="5" fill="#c0a060" opacity="0.5"/>
  <circle cx="312" cy="415" r="5" fill="#c0a060" opacity="0.5"/>
